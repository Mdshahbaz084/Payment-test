<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPI Payment</title>

<style>
body{
    font-family:Arial;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:30px;
    border-radius:15px;
    width:320px;
    text-align:center;
}

input,button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border-radius:10px;
    font-size:16px;
}

button{
    border:none;
    color:white;
    background:#5f259f;
}
</style>
</head>

<body>

<div class="box">

<h2>UPI Payment</h2>

<input type="number" id="amount" placeholder="Enter Amount">

<button onclick="pay()">
Pay Now
</button>

</div>

<script>

function pay(){

let amount=document.getElementById("amount").value;

if(amount=="" || amount<=0){
alert("Enter valid amount");
return;
}

let upi="upi://pay?pa=8962170487@ptyes&pn=Md%20Shahbaz&am="+amount+"&cu=INR";

window.location.replace(upi);

}

</script>

</body>
</html>
