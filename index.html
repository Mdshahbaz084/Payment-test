<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPI Payment</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:30px;
    width:320px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.1);
    text-align:center;
}

input{
    width:100%;
    padding:15px;
    font-size:18px;
    border-radius:10px;
    border:1px solid #ccc;
    margin-top:20px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    font-size:17px;
    color:white;
    cursor:pointer;
}

.gpay{
    background:#0F9D58;
}

.phonepe{
    background:#5f259f;
}

</style>
</head>

<body>

<div class="box">

<h2>UPI Payment</h2>

<input type="number" id="amount" placeholder="Enter Amount">

<button class="gpay" onclick="payGpay()">
Pay with Google Pay
</button>

<button class="phonepe" onclick="payPhonePe()">
Pay with PhonePe
</button>

</div>

<script>

function getAmount(){

let amount=document.getElementById("amount").value;

if(amount=="" || amount<=0){
alert("Enter valid amount");
return null;
}

return amount;

}

function payGpay(){

let amount=getAmount();

if(!amount) return;

let url =
"tez://upi/pay?pa=8962170487@ptyes&pn=Md%20Shahbaz&am="
+ amount +
"&cu=INR";

window.location.href=url;

}

function payPhonePe(){

let amount=getAmount();

if(!amount) return;

let url =
"phonepe://pay?pa=8962170487@ptyes&pn=Md%20Shahbaz&am="
+ amount +
"&cu=INR";

window.location.href=url;

}

</script>

</body>
</html>
