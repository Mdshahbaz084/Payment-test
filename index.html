<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UPI Payment</title>

<style>
    body{
        margin:0;
        padding:0;
        background:#f4f6f9;
        font-family:Arial, sans-serif;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .box{
        width:90%;
        max-width:400px;
        background:#fff;
        padding:30px;
        border-radius:20px;
        box-shadow:0 0 20px rgba(0,0,0,0.1);
        text-align:center;
    }

    h1{
        margin-bottom:10px;
        color:#222;
    }

    p{
        color:#666;
    }

    input{
        width:100%;
        padding:15px;
        font-size:18px;
        border-radius:10px;
        border:1px solid #ccc;
        margin-top:20px;
        box-sizing:border-box;
    }

    button{
        width:100%;
        padding:15px;
        border:none;
        border-radius:12px;
        font-size:18px;
        cursor:pointer;
        margin-top:15px;
        color:white;
        font-weight:bold;
    }

    .pay{
        background:#5f259f;
    }

    .gpay{
        background:#0f9d58;
    }

    .paytm{
        background:#00b9f5;
    }

    .note{
        margin-top:20px;
        font-size:14px;
        color:#999;
    }
</style>
</head>

<body>

<div class="box">

    <h1>UPI Payment</h1>
    <p>Enter Amount & Pay Securely</p>

    <input type="number" id="amount" placeholder="Enter Amount">

    <button class="pay" onclick="payNow()">
        Pay with PhonePe
    </button>

    <button class="gpay" onclick="payNow()">
        Pay with Google Pay
    </button>

    <button class="paytm" onclick="payNow()">
        Pay with Paytm
    </button>

    <div class="note">
        UPI ID: 8962170487@ptyes
    </div>

</div>

<script>

function payNow(){

    let amount = document.getElementById("amount").value;

    if(amount == "" || amount <= 0){
        alert("Please enter valid amount");
        return;
    }

    let upi = `upi://pay?pa=8962170487@ptyes&pn=Md%20Shahbaz&am=${amount}&cu=INR`;

    window.location.href = upi;
}

</script>

</body>
</html>
